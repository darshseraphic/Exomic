name: Exomic
description: "An industrial-grade, ultra-minimal financial tracking ecosystem."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  # 1. ADD THIS TOOL TO YOUR DEV_DEPENDENCIES:
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Registered custom application branding assets
  assets:
    - assets/logo.png

  # Ensure the Neo-Grotesque Inter font variants are explicitly mapped
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900

# 2. ADD THIS CONFIGURATION BLOCK AT THE BOTTOM OF THE FILE:
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  # Optional: For Android 8.0+ adaptive icon support (clean monochrome style)
  adaptive_icon_background: "#050505" # Matches your dark screen background
  adaptive_icon_foreground: "assets/logo.png"